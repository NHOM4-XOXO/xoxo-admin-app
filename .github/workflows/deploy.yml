name: CI/CD Deploy Admin (React Vite)

on:
  push:
    branches:
      - create/admin-ec2 # hoặc nhánh dev/admin tuỳ anh chọn

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build & Push Docker image (app-admin)
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-admin:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-admin:latest

      # 4. Copy docker-compose cho admin
      - name: Copy docker-compose (admin)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.EC2_KEY  }}
          source: "./docker-compose-admin.yml"
          target: "~/admin-app"

      # 5. Deploy trên EC2 (pull từ Docker Hub)
      - name: Deploy Admin on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/admin-app
            docker-compose -f docker-compose-admin.yml pull
            docker-compose -f docker-compose-admin.yml down
            docker-compose -f docker-compose-admin.yml up -d
