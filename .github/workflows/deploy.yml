name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint
      
    - name: Build project
      run: npm run build
      
    - name: Test build artifacts
      run: |
        ls -la dist/
        echo "✅ Build successful!"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging'
    
    steps:
    - name: Deploy to Staging
      run: |
        echo "🚀 Deploying to STAGING environment"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        
  deploy-production:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to Production
      run: |
        echo "🚀 Deploying to PRODUCTION environment"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "⚠️  Production deployment từ main branch"

  test-feature:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/feature/setup-cicd'
    
    steps:
    - name: Test Feature Branch
      run: |
        echo "🧪 Testing CI/CD setup trên feature branch"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "✅ Feature branch CI/CD test thành công!" 
