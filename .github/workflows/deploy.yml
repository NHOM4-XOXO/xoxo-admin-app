name: CI/CD Deploy Admin (React Vite)

on:
  push:
    branches:
      - create/admin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image (admin)
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-admin:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/xoxo-admin:latest

      - name: Copy docker-compose-admin.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "./docker-compose-admin.yml"
          target: "~/admin-app"

      - name: Deploy Admin on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/admin-app
            docker-compose -f docker-compose-admin.yml pull
            docker-compose -f docker-compose-admin.yml down
            docker-compose -f docker-compose-admin.yml up -d
